<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Street Rush</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div class="hud" id="hud"></div>
      <div class="panel panel-left" id="help-panel">
        <h1>City Street Rush</h1>
        <p>Drive, walk the sidewalks, take jobs, dodge the cops, and head to the racetrack when you want to race.</p>
        <div class="controls">
          <span><strong>Drive / Walk:</strong> WASD or Arrow Keys</span>
          <span><strong>Brake:</strong> Shift</span>
          <span><strong>Enter / Exit Car:</strong> Space</span>
          <span><strong>Interact:</strong> E</span>
          <span><strong>Backpack:</strong> B</span>
          <span><strong>Phone:</strong> P</span>
          <span><strong>Racetrack:</strong> T</span>
          <span><strong>New Race:</strong> N at the track</span>
          <span><strong>Reset Car:</strong> R</span>
        </div>
      </div>
      <div class="action-bar" id="action-bar">
        <button data-action="phone">Phone</button>
        <button data-action="track">Track</button>
        <button data-action="interact">Interact</button>
        <button data-action="bag">Bag</button>
      </div>
      <div class="panel panel-right hidden" id="backpack-panel"></div>
      <div class="panel panel-right hidden" id="phone-panel"></div>
      <div class="panel panel-center hidden" id="shop-panel"></div>
      <div class="toast" id="toast"></div>
      <div class="touch-controls" id="touch-controls">
        <button data-key="left" aria-label="Steer left">Left</button>
        <button data-key="forward" aria-label="Move forward">Forward</button>
        <button data-key="right" aria-label="Steer right">Right</button>
        <button data-key="brake" aria-label="Brake">Brake</button>
        <button data-action="space" aria-label="Enter or exit car">Car</button>
        <button data-action="interact" aria-label="Interact">Use</button>
        <button data-action="phone" aria-label="Open phone">Phone</button>
        <button data-action="track" aria-label="Go to track">Track</button>
        <button data-action="backpack" aria-label="Open backpack">Bag</button>
        <button data-action="reset" aria-label="Reset car">Reset</button>
      </div>
    </div>
  </body>
</html>
